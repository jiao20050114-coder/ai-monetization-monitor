name: Deploy to CloudBase

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudbase-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Build safe hosting bundle
        run: npm run build

      - name: Install CloudBase CLI
        run: npm install --global @cloudbase/cli

      - name: Authenticate to CloudBase
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"

      - name: Deploy static dashboard
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: tcb hosting deploy ./dist / -e "$TCB_ENV_ID"
